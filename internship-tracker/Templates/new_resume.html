<!DOCTYPE html>
<html>
<head>
    <title>New Resume</title>
</head>
<body>
    <h1>New Resume</h1>

    <form method="post">
        <label for="name">Resume Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="resume_text">Resume Text:</label><br>
        <textarea id="resume_text" name="resume_text" rows="15" cols="60"></textarea><br><br>

        <input type="submit" value="Save Resume">
    </form>

    <br>
    <a href="/resumes">View Resumes</a><br>
    <a href="/">Back to Home</a>
</body>
</html>
