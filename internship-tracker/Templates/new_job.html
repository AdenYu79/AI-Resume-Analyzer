<!DOCTYPE html>
<html>
<head>
    <title>New Job</title>
</head>
<body>
    <h1>New Job Description</h1>

    <form method="post">
        <label for="company">Company:</label><br>
        <input type="text" id="company" name="company"><br><br>

        <label for="title">Job Title:</label><br>
        <input type="text" id="title" name="title"><br><br>

        <label for="job_text">Job Description:</label><br>
        <textarea id="job_text" name="job_text" rows="10" cols="50"></textarea><br><br>

        <input type="submit" value="Save Job">
    </form>

    <br>
    <a href="/jobs">View Jobs</a><br>
    <a href="/">Back to Home</a>
</body>
</html>
